<script>
document.addEventListener('DOMContentLoaded', function() {
    const container = document.getElementById('wiki-loader');
    if (!container) return;

    // Delegate click handling on the container so it catches links added later
    // by the async wiki fetch (wiki/index.md loads after DOMContentLoaded).
    container.addEventListener('click', function(e) {
        const link = e.target.closest('a[href$=".md"]');
        if (!link || !container.contains(link)) return;

        e.preventDefault();
        const parent = link.closest('p, h1, h2, h3, h4, h5, h6');
        if (!parent) return;
        const existing = parent.nextElementSibling;

        // If already open, toggle it closed
        if (existing && existing.classList.contains('chapter-content')) {
            existing.remove();
            link.classList.remove('active');
            return;
        }

        // Create content div after the parent element
        const contentDiv = document.createElement('div');
        contentDiv.className = 'chapter-content';
        contentDiv.innerHTML = '<p class="loading">Loading...</p>';
        parent.insertAdjacentElement('afterend', contentDiv);
        link.classList.add('active');

        fetch(link.href + '?t=' + Date.now())
            .then(response => {
                if (!response.ok) throw new Error('Failed to load file');
                return response.text();
            })
            .then(text => {
                contentDiv.innerHTML = Brewdown.brewdown(text);
            })
            .catch(error => {
                contentDiv.innerHTML = '<p style="color: var(--caramel);">Error: ' + error.message + '</p>';
            });
    });
});
</script>
