<body>

  <sidebar>
    <!-- Placeholder for dynamic sidebar content -->
  </sidebar>

  <main>
    <div id="bounty-content" class="brewdown-rendered"></div>
    <button id="back-to-top">Back to Top</button>
  </main>

  <script>
    // Each bounty is a markdown file in bounties/. Add a new bounty by dropping
    // a .md file in that folder and adding an entry here.
    const BOUNTIES = [
      { file: "bounties/minecraft.md", title: "Minecraft Skin",  icon: "⛏️" },
      { file: "bounties/godot.md",     title: "Learn Godot",     icon: "🎮" },
      { file: "bounties/blender.md",   title: "Learn Blender",   icon: "🧊" },
      { file: "bounties/pixel-art.md", title: "Learn Pixel Art", icon: "🎨" },
    ];

    // URL-hash slug for a bounty: bare filename without folder or .md extension.
    const slugOf = b => b.file.split("/").pop().replace(/\.md$/, "");

    const content = document.getElementById("bounty-content");

    // The bounty board shown when no bounty is selected.
    function bountyBoard() {
      const list = BOUNTIES
        .map(b => `- [${b.icon} ${b.title}](#${slugOf(b)})`)
        .join("\n");
      return `# 🎯 Bounties\n\nOpen tasks I could use a hand with. Pick one and reach out if you want to help:\n\n${list}\n\n---\n\n::signature::`;
    }

    function render(md) {
      content.innerHTML = Brewdown.brewdown(md);
      if (typeof hljs !== "undefined") {
        content.querySelectorAll("pre code").forEach(b => hljs.highlightElement(b));
      }
      window.scrollTo(0, 0);
    }

    function loadBounty(bounty) {
      fetch(bounty.file)
        .then(r => {
          if (!r.ok) throw new Error(`Failed to load ${bounty.file} (${r.status})`);
          return r.text();
        })
        .then(md => render(`[← All Bounties](#)\n\n${md}\n\n---\n\n::signature::`))
        .catch(err => {
          render(`# ⚠️ Error\n\nCould not load this bounty: ${err.message}\n\n[← All Bounties](#)`);
        });
    }

    function route() {
      const wanted = location.hash.replace(/^#/, "");
      const bounty = BOUNTIES.find(b => slugOf(b) === wanted);
      if (bounty) {
        loadBounty(bounty);
      } else {
        render(bountyBoard());
      }
    }

    window.addEventListener("hashchange", route);
    window.addEventListener("DOMContentLoaded", route);
  </script>

</body>
</html>
