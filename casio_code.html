# Preface
Most programs are designed for the Casio fx-9750 G PLUS. Be aware of the following:

## Technical Specifications
- **User memory capacity:** 28,000 bytes
- **Transfer speed:** 9600 bits/sec = 1.2 KB/s

## Memory Usage
- Each character = 1 byte
- Each command = 2 bytes
- Each List/Matrix cell = 10 bytes
- 17 bytes to name a new program
- в–Ў means space (if not understood)

The carriage return is excluded from the text, as it appears at the end of every line.

## Memory Numbers
- **First number:** Memory required to program it
- **Second number:** Additional memory used when running the program

All variables are assumed to be pre-filled.

вҳ… This program can be found somewhere in this document.

## Placeholder Names
- **Skribble** (also written as "sCrib6le") is used as a fake company name

## Program Controls
- **AutoPlay** is an AI program
  - Press [shift] to activate
  - Press [alpha] to deactivate

An ' symbol within a program indicates notes that will not be displayed or affect the program.
